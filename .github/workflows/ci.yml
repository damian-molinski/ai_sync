name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.11.0

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-dart-3.11.0-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-dart-3.11.0-pub-

      - name: Install dependencies
        run: dart pub get

      - name: Static analysis
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

      - name: Build native binary
        run: dart compile exe bin/ai_sync.dart -o ai_sync
